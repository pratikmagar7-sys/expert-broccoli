<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reading List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0b;
    --surface: #141412;
    --border: #222220;
    --text: #e8e4dc;
    --muted: #6b6860;
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.12);
    --finished: #4a7c59;
    --reading: #c9a96e;
    --tag-bio: #3a4a5c;
    --tag-history: #4a3a2e;
    --tag-philosophy: #3a3a4a;
    --tag-fiction: #3a4a3a;
    --tag-nonfiction: #3a4035;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  header {
    padding: 72px 64px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 5vw, 5rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }

  .header-left h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .header-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .stat {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat span {
    color: var(--text);
    font-weight: 400;
  }

  /* Filters */
  .controls {
    padding: 24px 64px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 8px;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 5px 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-transform: uppercase;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
    padding: 0;
  }

  .book-card {
    background: var(--bg);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .book-card[data-hidden="true"] {
    display: none;
  }

  .book-card:hover {
    background: var(--surface);
  }

  .cover-wrap {
    position: relative;
    aspect-ratio: 2/3;
    overflow: hidden;
    background: var(--surface);
  }

  .cover-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .cover-img.loaded {
    opacity: 1;
  }

  .cover-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    gap: 12px;
    background: var(--surface);
    transition: opacity 0.3s ease;
  }

  .cover-placeholder.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .placeholder-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 400;
    font-style: italic;
    text-align: center;
    line-height: 1.3;
    color: var(--text);
  }

  .placeholder-line {
    width: 24px;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }

  .placeholder-author {
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  /* Hover overlay */
  .hover-overlay {
    position: absolute;
    inset: 0;
    background: rgba(12,12,11,0.88);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 16px;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.25s ease;
    backdrop-filter: blur(2px);
  }

  .book-card:hover .hover-overlay {
    opacity: 1;
  }

  .book-card:hover .cover-img {
    transform: scale(1.04);
  }

  .overlay-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 400;
    font-style: italic;
    line-height: 1.2;
    color: var(--text);
  }

  .overlay-author {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .overlay-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }

  /* Card footer */
  .card-footer {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
  }

  .book-title-short {
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: calc(100% - 60px);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.finished { background: var(--finished); }
  .status-dot.reading {
    background: var(--reading);
    box-shadow: 0 0 6px var(--reading);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .genre-tag {
    display: inline-block;
    font-size: 0.52rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 1px;
    color: var(--text);
    opacity: 0.85;
  }

  .tag-bio { background: var(--tag-bio); }
  .tag-history { background: var(--tag-history); }
  .tag-philosophy { background: var(--tag-philosophy); }
  .tag-fiction { background: var(--tag-fiction); }
  .tag-nonfiction { background: var(--tag-nonfiction); }
  .tag-other { background: #2a2a2a; }

  /* Footer */
  footer {
    padding: 40px 64px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-text {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .legend {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Load animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .book-card {
    animation: fadeUp 0.4s ease both;
  }

  @media (max-width: 768px) {
    header { padding: 48px 24px 32px; }
    .controls { padding: 16px 24px; }
    footer { padding: 32px 24px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>My <em>Reading</em><br>List</h1>
  </div>
  <div class="header-meta">
    <div class="stat"><span id="total-count">13</span> books total</div>
    <div class="stat"><span id="finished-count">10</span> finished</div>
    <div class="stat"><span id="reading-count">3</span> reading now</div>
  </div>
</header>

<div class="controls">
  <span class="filter-label">filter</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="reading">Reading</button>
  <button class="filter-btn" data-filter="finished">Finished</button>
  <button class="filter-btn" data-filter="Biography / Memoir">Memoir</button>
  <button class="filter-btn" data-filter="History">History</button>
  <button class="filter-btn" data-filter="Philosophy">Philosophy</button>
  <button class="filter-btn" data-filter="Fiction">Fiction</button>
  <button class="filter-btn" data-filter="Non-Fiction">Non-Fiction</button>
</div>

<div class="grid" id="book-grid"></div>

<footer>
  <div class="footer-text">Reading Journal · Pratik</div>
  <div class="legend">
    <div class="legend-item">
      <div class="status-dot finished"></div>finished
    </div>
    <div class="legend-item">
      <div class="status-dot reading"></div>reading
    </div>
  </div>
</footer>

<script>
const books = [
  { title: "Greenlights", author: "Matthew McConaughey", genre: "Biography / Memoir", status: "Finished", search: "greenlights mcconaughey" },
  { title: "The Outsider", author: "Vir Das", genre: "Biography / Memoir", status: "Finished", search: "the outsider vir das" },
  { title: "Discovery of India", author: "Jawaharlal Nehru", genre: "Biography / Memoir", status: "Finished", search: "discovery of india nehru" },
  { title: "The New Icon", author: "Arun Shourie", genre: "History", status: "Finished", search: "new icon arun shourie" },
  { title: "Shattered Lands", author: "Sam Dalrymple", genre: "History", status: "Finished", search: "shattered lands dalrymple" },
  { title: "Unseen", author: "Megha Vishwanath", genre: "Biography / Memoir", status: "Finished", search: "unseen megha vishwanath" },
  { title: "Shoe Dog", author: "Phil Knight", genre: "Biography / Memoir", status: "Finished", search: "shoe dog phil knight" },
  { title: "Atlas Shrugged", author: "Ayn Rand", genre: "Philosophy", status: "Finished", search: "atlas shrugged ayn rand" },
  { title: "Principles", author: "Ray Dalio", genre: "Biography / Memoir", status: "Reading", search: "principles ray dalio" },
  { title: "Vikramaditya", author: "V A Iyer", genre: "History", status: "Reading", search: "vikramaditya iyer" },
  { title: "Critique of Judgement", author: "Immanuel Kant", genre: "Philosophy", status: "Reading", search: "critique of judgement kant" },
  { title: "The Innovators", author: "Walter Isaacson", genre: "Non-Fiction", status: "Finished", search: "the innovators walter isaacson" },
  { title: "The Wonderful Adventures of Nils Holgersson", author: "Selma Lagerlöf", genre: "Fiction", status: "Finished", search: "wonderful adventures nils holgersson" },
];

function genreClass(genre) {
  const g = genre.toLowerCase();
  if (g.includes('biography') || g.includes('memoir')) return 'tag-bio';
  if (g.includes('history')) return 'tag-history';
  if (g.includes('philosophy')) return 'tag-philosophy';
  if (g.includes('fiction') && !g.includes('non')) return 'tag-fiction';
  if (g.includes('non-fiction') || g.includes('nonfiction')) return 'tag-nonfiction';
  return 'tag-other';
}

function genreShort(genre) {
  if (!genre) return 'other';
  const g = genre.toLowerCase();
  if (g.includes('biography') || g.includes('memoir')) return 'Memoir';
  if (g.includes('history')) return 'History';
  if (g.includes('philosophy')) return 'Philosophy';
  if (g.includes('non-fiction')) return 'Non-Fiction';
  if (g.includes('fiction')) return 'Fiction';
  return genre;
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n - 1) + '…' : str;
}

async function fetchCover(book, imgEl, placeholderEl) {
  try {
    const q = encodeURIComponent(book.search);
    const res = await fetch(`https://openlibrary.org/search.json?q=${q}&limit=1&fields=cover_i,title`);
    const data = await res.json();
    const doc = data.docs?.[0];
    if (doc?.cover_i) {
      const url = `https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg`;
      imgEl.src = url;
      imgEl.onload = () => {
        imgEl.classList.add('loaded');
        placeholderEl.classList.add('hidden');
      };
      imgEl.onerror = () => {};
    }
  } catch(e) {}
}

const grid = document.getElementById('book-grid');

books.forEach((book, i) => {
  const card = document.createElement('div');
  card.className = 'book-card';
  card.dataset.status = book.status.toLowerCase();
  card.dataset.genre = book.genre;
  card.style.animationDelay = `${i * 40}ms`;

  const gClass = genreClass(book.genre);
  const gShort = genreShort(book.genre);
  const statusClass = book.status.toLowerCase();

  card.innerHTML = `
    <div class="cover-wrap">
      <img class="cover-img" alt="${book.title}" />
      <div class="cover-placeholder">
        <div class="placeholder-title">${book.title}</div>
        <div class="placeholder-line"></div>
        <div class="placeholder-author">${book.author}</div>
      </div>
      <div class="hover-overlay">
        <div class="overlay-title">${book.title}</div>
        <div class="overlay-author">${book.author}</div>
        <div class="overlay-tags">
          ${book.genre ? `<span class="genre-tag ${gClass}">${gShort}</span>` : ''}
          <span class="genre-tag" style="background:${book.status==='Reading'?'rgba(201,169,110,0.2)':'rgba(74,124,89,0.2)'}; color:${book.status==='Reading'?'var(--reading)':'var(--finished)'}">${book.status}</span>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <span class="book-title-short">${truncate(book.title, 22)}</span>
      <div class="status-dot ${statusClass}"></div>
    </div>
  `;

  grid.appendChild(card);

  const img = card.querySelector('.cover-img');
  const placeholder = card.querySelector('.cover-placeholder');
  fetchCover(book, img, placeholder);
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const filter = btn.dataset.filter;
    document.querySelectorAll('.book-card').forEach((card, i) => {
      let show = true;
      if (filter === 'reading') show = card.dataset.status === 'reading';
      else if (filter === 'finished') show = card.dataset.status === 'finished';
      else if (filter !== 'all') show = card.dataset.genre === filter;

      card.dataset.hidden = show ? 'false' : 'true';
      if (show) card.style.animationDelay = `${i * 20}ms`;
    });
  });
});
</script>
</body>
</html>
